name: El Vigilante en Vivo

on:
  schedule:
    - cron: '0 0 31 2 *'
  workflow_dispatch:

jobs:
  vigilar-goles:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Ejecutar el Vigilante
        env:
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }} # LA NUEVA LLAVE MAESTRA
          GITHUB_REPOSITORY: ${{ github.repository }} # RUTA AUTOMÁTICA DEL REPO
        run: python scraper_vivo.py
